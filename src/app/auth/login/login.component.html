<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Library System</h1>
      <p>Secure Management Access</p>
    </div>

    <form #form="ngForm" (ngSubmit)="onSubmit(form)" novalidate>
      
      <div class="form-field" [class.has-error]="username.touched && username.invalid">
        <label for="username">Username <span class="required">*</span></label>
        <input
          id="username"
          name="username"
          [(ngModel)]="model.username"
          #username="ngModel"
          required
          minlength="3"
          placeholder="e.g. admin_user"
        />
        <div class="hint" *ngIf="username.touched && username.invalid">
          Please enter your username.
        </div>
      </div>

      <div class="form-field" [class.has-error]="password.touched && password.invalid">
        <label for="password">Password <span class="required">*</span></label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="model.password"
          #password="ngModel"
          required
          minlength="6"
          placeholder="••••••••"
        />
        <div class="hint" *ngIf="password.touched && password.invalid">
          Please enter your password.
        </div>
      </div>

      <button type="submit" class="submit-btn" [disabled]="form.invalid || isLoading">
        {{ isLoading ? 'Checking credentials...' : 'Sign In' }}
      </button>

      <div class="auth-footer">
        Don't have an account? <a routerLink="/register">Register Identity</a>
      </div>
    </form>
  </div>
</div>
